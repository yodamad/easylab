# GitLab CI/CD Pipeline
# 
# This pipeline builds and publishes Docker images to Docker Hub
# and Helm charts to the GitLab Package Registry.
# 
# Required GitLab CI/CD Variables (set in Project Settings > CI/CD > Variables):
#   - DOCKER_REGISTRY_USER: Docker Hub username
#   - DOCKER_REGISTRY_PASSWORD: Docker Hub password or access token (masked, protected)
#
# Optional (to auto-update docker-compose.yml image tag on release):
#   - GITLAB_PROJECT_ACCESS_TOKEN: Project access token with write_repository (masked, protected)
#
# Image Tagging Strategy:
#   - Tagged as "dev" for branch commits
#   - Tagged with Git tag name for Git tag commits (e.g., v1.0.0)
#   - Images are multi-platform (linux/amd64, linux/arm64); build uses Docker Buildx + SKIP_BUILD=false
#     so each architecture is compiled inside the image build (see docker-build job).
#
# Helm Chart Publishing (tags only):
#   - Chart version derived from Git tag (v prefix stripped)
#   - Published to Docker Hub as OCI artifact (oci://registry-1.docker.io/yodamad/easylab)

variables:
  GO_VERSION: "1.26"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: "docker.io/${DOCKER_REGISTRY_USER}/easylab"
  # for zensical
  # GitLab CI creates a separate mountpoint for the build directory,
  # so we need to copy instead of using hard links.
  UV_LINK_MODE: copy  

stages:
  - build
  - test
  - package
  - security
  - deploy
  - publish

# Reusable image tag computation (dev for branches, tag name for tags)
.image-tag:
  before_script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export IMAGE_TAG="$CI_COMMIT_REF_NAME"
      else
        export IMAGE_TAG="dev"
      fi

# Base job for Go jobs with module caching
.go-base:
  image: golang:${GO_VERSION}
  variables:
    GOMODCACHE: ${CI_PROJECT_DIR}/.go-mod-cache
  before_script:
    - go version
    - go mod download
    - go mod verify
  tags:
    - docker

# Build a static Linux binary for Docker
build:
  extends: .go-base
  stage: build
  script:
    - CGO_ENABLED=0 GOOS=linux go build -a -installsuffix cgo -o main ./cmd/server
  artifacts:
    paths:
      - main
      - web/
    expire_in: 1 hour
  cache:
    key: go-modules-${CI_COMMIT_REF_SLUG}
    paths:
      - .go-mod-cache/
    policy: pull-push

# Run Go tests (starts immediately, parallel with build)
test:
  extends: .go-base
  stage: test
  needs: []
  script:
    - mkdir -p reports
    - go test -v -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+\d+\.\d+%/'
  artifacts:
    paths:
      - coverage.out
      - reports/
    expire_in: 1 week
    when: always
  cache:
    key: go-modules-${CI_COMMIT_REF_SLUG}
    paths:
      - .go-mod-cache/
    policy: pull

# Lint Dockerfile with Hadolint
hadolint:
  stage: test
  needs: []
  image: hadolint/hadolint:latest-alpine
  script:
    - hadolint Dockerfile
  allow_failure: false

# Multi-arch Docker image (linux/amd64 + linux/arm64), push manifest to registry.
# SKIP_BUILD=false: compile Go per TARGETARCH inside Docker (single CI "main" artifact is amd64-only).
# Requires privileged job for QEMU/binfmt when cross-building on single-arch runners.
docker-build:
  stage: package
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_BUILDKIT: "1"
  needs:
    - job: test
      artifacts: false
    - job: hadolint
      artifacts: false
  before_script:
    - !reference [.image-tag, before_script]
    - echo "Building and pushing multi-arch image ${IMAGE_NAME}:${IMAGE_TAG}"
    - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USER" --password-stdin
  script:
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --build-arg SKIP_BUILD=false \
        -t "${IMAGE_NAME}:${IMAGE_TAG}" \
        --push \
        .
  after_script:
    - docker logout || true
  only:
    - branches
    - tags
  tags:
    - docker

# Package Helm chart (tags only — version derived from Git tag)
helm-package:
  stage: package
  image:
    name: alpine/helm:latest
    entrypoint: [""]
  needs: []
  before_script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - echo "Packaging Helm chart version ${VERSION}"
  script:
    - helm lint helm/easylab
    - helm package helm/easylab --version "${VERSION}" --app-version "${VERSION}"
  artifacts:
    paths:
      - easylab-helm-*.tgz
    expire_in: 1 hour
  only:
    - tags

# Security scan with Trivy (pulls published image; multi-arch resolves to runner-native variant)
trivy-scan:
  stage: security
  image: aquasec/trivy:latest
  needs:
    - job: docker-build
      artifacts: false
  variables:
    TRIVY_USERNAME: "${DOCKER_REGISTRY_USER}"
    TRIVY_PASSWORD: "${DOCKER_REGISTRY_PASSWORD}"
  before_script:
    - !reference [.image-tag, before_script]
  script: |
    trivy image "${IMAGE_NAME}:${IMAGE_TAG}" --exit-code 0 --severity HIGH,CRITICAL --format table
    trivy image "${IMAGE_NAME}:${IMAGE_TAG}" --exit-code 0 --severity HIGH,CRITICAL --format json --output gl-container-scanning-report.json || true
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
    paths:
      - gl-container-scanning-report.json
    expire_in: 1 week
    when: always
  allow_failure: true
  only:
    - branches
    - tags

docker-hub-readme:
  stage: publish
  image: alpine:3
  needs:
    - job: trivy-scan
      artifacts: false
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      TOKEN=$(curl -s -X POST https://hub.docker.com/v2/users/login \
        -H "Content-Type: application/json" \
        -d "{\"username\":\"${DOCKER_REGISTRY_USER}\",\"password\":\"${DOCKER_REGISTRY_PASSWORD}\"}" \
        | jq -r .token)
    - |
      jq -n --arg desc "$(cat README.md)" '{"full_description": $desc}' \
        | curl -s -X PATCH "https://hub.docker.com/v2/repositories/${DOCKER_REGISTRY_USER}/easylab/" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d @-
  only:
    - tags

# Update docker-compose.yml image tag to the release tag and push to default branch.
# Requires CI/CD variable GITLAB_PROJECT_ACCESS_TOKEN (project access token with write_repository).
update-docker-compose:
  stage: publish
  image: alpine:3
  needs:
    - job: trivy-scan
      artifacts: false
  before_script:
    - apk add --no-cache git sed
    - git config --global user.email "ci@gitlab"
    - git config --global user.name "GitLab CI"
  script: |
      if [ -z "${GITLAB_PROJECT_ACCESS_TOKEN}" ]; then
        echo "GITLAB_PROJECT_ACCESS_TOKEN not set; skipping docker-compose update."
        exit 0
      fi
      git clone --depth 1 --branch "${CI_DEFAULT_BRANCH}" "https://gitlab-ci-token:${GITLAB_PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" repo
      cd repo
      sed -i "s|\(image: docker.io/[^/]*/easylab:\)[^[:space:]]*|\1${CI_COMMIT_TAG}|" docker-compose.yml

      if git diff --quiet docker-compose.yml; then
        echo "docker-compose.yml already has image tag ${CI_COMMIT_TAG}; nothing to commit."
        exit 0
      fi
      git add docker-compose.yml
      git commit -m "🐳 Update docker-compose when releasing"
      git push "https://gitlab-ci-token:${GITLAB_PROJECT_ACCESS_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_DEFAULT_BRANCH}
  only:
    - tags
  tags:
    - docker

goreleaser:
  stage: publish
  image:
    name: goreleaser/goreleaser
    entrypoint: [""]
  only:
    - tags
  variables:
    GIT_DEPTH: 0
    GITLAB_TOKEN: ${CI_JOB_TOKEN}
  script:
    - goreleaser release --clean -f .goreleaser.gitlab.yaml

# Publish Helm chart to Docker Hub as OCI artifact
helm-publish:
  stage: publish
  image:
    name: alpine/helm:latest
    entrypoint: [""]
  needs:
    - job: helm-package
      artifacts: true
  before_script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - helm registry login registry-1.docker.io -u "$DOCKER_REGISTRY_USER" -p "$DOCKER_REGISTRY_PASSWORD"
  script:
    - helm push "easylab-helm-${VERSION}.tgz" oci://registry-1.docker.io/yodamad
  after_script:
    - helm registry logout registry-1.docker.io
  only:
    - tags

pages:
  stage: deploy
  image: ghcr.io/astral-sh/uv:0.10.2-python3.12-alpine
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
    - export LATEST_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "latest")
    - sed -i "s/__VERSION__/${LATEST_VERSION}/g" docs/helm.md
  script:
    - uv add --dev zensical
    - uv run zensical build
  needs: []
  artifacts:
    paths:
      - site
  publish: site
  tags:
    - docker
  retry: 2 # In case of ulimit errors

