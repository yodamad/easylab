name: Announce Release

on:
  push:
    tags:
      - '*'

jobs:
  bluesky:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Get release notes
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} --jq '.body // ""')
          SUMMARY=$(echo "$BODY" | head -n 5 | sed 's/\*\*//g' | sed 's/ in [a-f0-9]\{7,\}//g' | sed 's/ https:\/\/github.com[^ ]*//g' | sed '/^$/d')
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post to Bluesky
        uses: cbrgm/bluesky-github-action@v1
        with:
          handle: ${{ secrets.BLUESKY_HANDLE }}
          password: ${{ secrets.BLUESKY_APP_PASSWORD }}
          text: |
            🧪 EasyLab ${{ github.ref_name }} is out! 🚀

            ${{ steps.release.outputs.summary }}

            🔗 https://github.com/yodamad/easylab/releases/tag/${{ github.ref_name }}
            📦 docker.io/yodamad/easylab:${{ github.ref_name }}
            
